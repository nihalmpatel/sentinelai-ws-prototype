<div class="min-h-screen bg-slate-950 text-slate-50">
  <header class="border-b border-slate-800 bg-slate-950/80 backdrop-blur">
    <div class="mx-auto max-w-6xl px-6 py-4 flex items-center justify-between">
      <div>
        <h1 class="text-xl font-semibold tracking-tight">
          {{ title }}
        </h1>
        <p class="text-sm text-slate-400">
          AI drafts, humans supervise – demo dashboard
        </p>
      </div>
      <button
        type="button"
        class="inline-flex items-center gap-2 rounded-md bg-emerald-500 px-4 py-2 text-sm font-medium text-slate-950 shadow-sm hover:bg-emerald-400 disabled:cursor-not-allowed disabled:opacity-60"
        (click)="evaluateSample()"
        [disabled]="isEvaluating"
      >
        <span *ngIf="!isEvaluating">Evaluate sample transaction</span>
        <span *ngIf="isEvaluating">Evaluating…</span>
      </button>
    </div>
  </header>

  <main class="mx-auto max-w-6xl px-6 py-6 space-y-4">
    <section class="space-y-3">
      <h2 class="text-sm font-semibold uppercase tracking-wide text-slate-400">
        Cases
      </h2>

      <div
        class="rounded-xl border border-slate-800 bg-slate-900/60 shadow-sm overflow-hidden"
      >
        <div class="border-b border-slate-800 px-4 py-2 text-xs text-slate-400">
          Active & recent cases
        </div>
        <div *ngIf="isLoadingCases" class="p-4 text-sm text-slate-400">
          Loading cases…
        </div>
        <div *ngIf="!isLoadingCases && cases.length === 0" class="p-4 text-sm text-slate-400">
          No cases yet. Use “Evaluate sample transaction” to create one.
        </div>
        <ul *ngIf="!isLoadingCases && cases.length > 0" class="divide-y divide-slate-800">
          <li
            *ngFor="let c of cases"
            class="flex items-center justify-between px-4 py-3 text-sm hover:bg-slate-800/60"
          >
            <div>
              <div class="flex items-center gap-2">
                <span class="font-medium text-slate-50">Case #{{ c.id }}</span>
                <span class="text-xs rounded-full border border-slate-700 px-2 py-0.5 text-slate-300">
                  User {{ c.userId }}
                </span>
              </div>
              <div class="mt-1 text-xs text-slate-400">
                Status:
                <span class="uppercase tracking-wide">
                  {{ c.status }}
                </span>
              </div>
            </div>
            <div class="flex items-center gap-3">
              <sentinel-risk-badge [score]="c.riskProfile?.score"></sentinel-risk-badge>
              <a
                class="rounded-md border border-slate-700 bg-slate-950/40 px-3 py-1.5 text-xs text-slate-100 hover:bg-slate-800/60"
                [routerLink]="['/cases', c.id]"
              >
                Open
              </a>
            </div>
          </li>
        </ul>
      </div>

      <div *ngIf="errorMessage" class="rounded-md border border-rose-500/50 bg-rose-950/40 px-3 py-2 text-xs text-rose-200">
        {{ errorMessage }}
      </div>
    </section>
  </main>
</div>
